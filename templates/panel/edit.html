{% extends 'base.html' %}
{% block title %}{{ page_name }} &mdash; {{ category.cat_name }}{{ post.title }}{% endblock %}
{% block content %}

<div class="form-page">
    <div class="form-card">
        <a href="{{ request.META.HTTP_REFERER }}" class="back-link">Go Back</a>
        <h3>{{ page_name }}</h3>
        <form action="" method="post">
            {% csrf_token %}
            <div class="fields">
                {{ form }}
            </div>
            <div class="btn-holder">
                <button type="submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
