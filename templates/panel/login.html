{% extends 'base.html' %}
{% load static %}
{% block title %}Admin Login{% endblock %}
{% block content %}

<div class="form-page">
    <div class="form-card">
        <a href="{{ request.META.HTTP_REFERER }}" class="back-link">Go Back</a>
        <h3>Admin Login</h3>
        <form action="" method="post">
            {% csrf_token %}
            <div class="fields">
                {{ form }}
            </div>
            <div class="btn-holder">
                <button type="submit">Login</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
