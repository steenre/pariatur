{% extends 'base.html' %}
{% block title %}{{ page_name }}{% endblock %}
{% block content %}

{% if request.user.is_superuser %}
<div class="form-page">
    <div class="form-card">
        <a href="{{ request.META.HTTP_REFERER }}" class="back-link">Go Back</a>
        <h3>{{ page_name }}</h3>
        <form action="" method="post">
            {% csrf_token %}
            <div class="fields">
                {{ form }}
            </div>
            <div class="btn-holder">
                <button type="submit">Save</button>
            </div>
        </form>
    </div>
</div>
{% else %}
<div class="form-page">
    <div class="form-card">
        <div class="warning">
            <p>You do not have permission to access this page.</p>
        </div>
    </div>
</div>
{% endif %}

{% endblock %}
